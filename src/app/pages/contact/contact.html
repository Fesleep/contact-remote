<section class="contact">
  <div class="contact__header">
    <h1>{{ 'contact.title' | translate }}</h1>
    <p>{{ 'contact.intro' | translate }}</p>
  </div>

  <form class="contact__form" novalidate (ngSubmit)="onSubmit()">
    <div class="contact__grid">
      <ui-input
        [label]="'contact.name' | translate"
        [placeholder]="'contact.namePlaceholder' | translate"
        type="text"
        [(value)]="name"
      />
      <ui-input
        [label]="'contact.email' | translate"
        [placeholder]="'contact.emailPlaceholder' | translate"
        type="email"
        [(value)]="email"
      />
    </div>

    <ui-input
      [label]="'contact.subject' | translate"
      [placeholder]="'contact.subjectPlaceholder' | translate"
      type="text"
      [(value)]="subject"
    />

    <label class="contact__field">
      <span class="contact__label">{{ 'contact.message' | translate }}</span>
      <textarea
        name="message"
        rows="4"
        [placeholder]="'contact.messagePlaceholder' | translate"
        class="contact__textarea"
        [(ngModel)]="message"
      ></textarea>
    </label>

    <ui-button (pressed)="onSubmit()">{{ 'contact.send' | translate }}</ui-button>
  </form>

  <div class="contact__meta">
    <h2>{{ 'contact.otherWays' | translate }}</h2>
    <p>{{ 'contact.emailLabel' | translate }} <a href="mailto:support@example.com">support@example.com</a></p>
  </div>
</section>
